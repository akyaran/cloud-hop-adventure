<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#5fbce9">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Cloud Hop">
    <meta name="description" content="iPadで遊べるオリジナル2Dアクションゲーム">
    <title>Cloud Hop Adventure</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" href="./icons/icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png">
    <link rel="apple-touch-startup-image" href="./icons/launch-2048x2732.png" media="(device-width: 1024px) and (device-height: 1366px)">
    <link rel="stylesheet" href="./styles.css?v=11">
  </head>
  <body>
    <main class="game-shell" aria-label="Cloud Hop Adventure">
      <section id="stage-wrap" class="stage-wrap">
        <canvas id="game" width="960" height="540" aria-label="2Dアクションゲーム画面"></canvas>

        <div id="version-badge" class="version-badge">v11</div>

        <div class="hud" aria-live="polite">
          <div class="hud-item">
            <span class="hud-label">STAGE</span>
            <strong id="stage-number">1</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">COINS</span>
            <strong id="coins">0</strong>
          </div>
          <div class="hud-item wind-hud">
            <span class="hud-label">WIND</span>
            <strong id="wind-level">Lv.0</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">SCORE</span>
            <strong id="score">0</strong>
          </div>
          <div class="hud-item">
            <span class="hud-label">LIVES</span>
            <strong id="lives">3</strong>
          </div>
        </div>

        <button id="pause-button" class="icon-button" type="button" aria-label="一時停止" title="一時停止">Ⅱ</button>

        <div id="overlay" class="overlay">
          <div class="overlay-panel">
            <p class="kicker">PWA 2D ACTION</p>
            <h1 id="overlay-title">Cloud Hop Adventure</h1>
            <p id="overlay-text">星の実を集めて、雲の門まで走り抜けよう。</p>

            <div id="stage-picker" class="stage-picker" aria-label="ステージ選択">
              <button class="stage-option is-selected" type="button" data-stage="0">1</button>
              <button class="stage-option" type="button" data-stage="1">2</button>
              <button class="stage-option" type="button" data-stage="2">3</button>
              <button class="stage-option" type="button" data-stage="3">4</button>
              <button class="stage-option" type="button" data-stage="4">5</button>
            </div>

            <div id="settings" class="settings">
              <label><input id="sound-toggle" type="checkbox" checked> 効果音</label>
              <label><input id="music-toggle" type="checkbox" checked> BGM</label>
            </div>

            <button id="start-button" class="primary-button" type="button">スタート</button>
          </div>
        </div>

        <div class="touch-controls" aria-label="タッチ操作">
          <div class="touch-left">
            <button class="touch-button" data-touch="left" type="button" aria-label="左へ移動">◀</button>
            <button class="touch-button" data-touch="right" type="button" aria-label="右へ移動">▶</button>
          </div>
          <button class="touch-button jump" data-touch="jump" type="button" aria-label="ジャンプ">JUMP</button>
        </div>
      </section>
    </main>

    <script src="./app.js?v=11"></script>
  </body>
</html>
